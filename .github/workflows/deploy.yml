name: Deploy Aliased Scripts
on:
  push:
    branches: [ main ]
    paths:
      - 'alias.yml'
      - '**.ps1'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Deployment Directory
        run: |
          mkdir deploy
          # Install yq to parse the yaml
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

          # Read each key (alias) and value (path) from alias.yml
          yq e '. | to_entries | .[] | .key + " " + .value' alias.yml | while read -r line; do
            alias=$(echo $line | cut -d' ' -f1)
            path=$(echo $line | cut -d' ' -f2)
            
            # Copy the actual script to the new short name
            if [ -f "$path" ]; then
              cp "$path" "deploy/$alias"
              echo "Mapped $alias -> $path"
            else
              echo "Error: $path not found"
            fi
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
